<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GPS Realtime Viewer</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1220;
        --card: #0f172a;
        --ink: #e2e8f0;
        --muted: #94a3b8;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--ink);
      }
      header {
        padding: 16px;
        background: var(--card);
        border-bottom: 1px solid #1f2937;
      }
      #map {
        height: calc(100vh - 120px);
      }
      .meta {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        padding: 12px 16px;
        background: var(--card);
        border-top: 1px solid #1f2937;
      }
      .meta span {
        color: var(--muted);
      }
      .status {
        color: #38bdf8;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <header>
      <h2>GPS Realtime Viewer</h2>
      <div>Thiết bị: <span id="deviceId">TRACKER_001</span></div>
      <div class="status" id="status">Đang kết nối...</div>
    </header>
    <div id="map"></div>
    <div class="meta">
      <div>Lat: <span id="lat">--</span></div>
      <div>Lng: <span id="lng">--</span></div>
      <div>Last update: <span id="ts">--</span></div>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script>
      const urlParams = new URLSearchParams(location.search);
      const deviceId = urlParams.get("id") || "TRACKER_001";
      document.getElementById("deviceId").textContent = deviceId;

      const map = L.map("map").setView([10.762622, 106.660172], 15);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "&copy; OpenStreetMap contributors",
      }).addTo(map);
      const marker = L.marker([10.762622, 106.660172]).addTo(map);

      const statusEl = document.getElementById("status");
      const latEl = document.getElementById("lat");
      const lngEl = document.getElementById("lng");
      const tsEl = document.getElementById("ts");

      function updateUI(payload) {
        if (!payload || payload.id !== deviceId) return;
        const lat = Number(payload.lat);
        const lng = Number(payload.lng);
        if (Number.isFinite(lat) && Number.isFinite(lng)) {
          marker.setLatLng([lat, lng]);
          map.setView([lat, lng], 17);
          latEl.textContent = lat.toFixed(6);
          lngEl.textContent = lng.toFixed(6);
        }
        if (payload.ts) {
          const ts = new Date(payload.ts);
          tsEl.textContent = ts.toLocaleString();
        }
      }

      function connect() {
        const wsUrl = "wss://gps-tracker.ahcntab.workers.dev/ws";
        const ws = new WebSocket(wsUrl);
        statusEl.textContent = "Đã kết nối";

        ws.onmessage = (event) => {
          try {
            const payload = JSON.parse(event.data);
            updateUI(payload);
          } catch (err) {
            console.warn("Bad payload", err);
          }
        };

        ws.onclose = () => {
          statusEl.textContent = "Mất kết nối, thử lại...";
          setTimeout(connect, 1500);
        };
      }

      connect();
    </script>
  </body>
</html>
